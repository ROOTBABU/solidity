<header class="header fixed-top">
    <div class="branding docs-branding">
      <div class="container-fluid position-relative py-2">
        <div class="docs-logo-wrapper">
          <div class="site-logo"><a class="navbar-brand" href="index.html">
              <img width="40px" src="./assets/images/logo.png">
              <span class="logo-text">ROOTBABU.SOL</span>
            </a></div>
        </div>
        <div class="docs-top-utilities d-flex justify-content-end align-items-center">
          <ul class="social-list list-inline mx-md-3 mx-lg-5 mt-2 mb-0 d-none d-lg-flex">
            <li class="list-inline-item"><a href="https://github.com/ROOTBABU/solidity" target="_blank"><i class="fab fa-github fa-fw"></i></a></li>
            <li class="list-inline-item"><a href="#"><i class="fab fa-twitter fa-fw"></i></a></li>
            <li class="list-inline-item"><a href="#"><i class="fab fa-discord"></i></a></li>
            <li class="list-inline-item"><a href="#"><i class="fas fa-info-circle"></i></a></li>
          </ul>
        </div>
      </div>
    </div>
  </header>
  
  <div class="page-header theme-bg-dark py-5 text-center position-relative">
    <div class="container">
      <h1 class="page-heading single-col-max mx-auto">This is the perfect place</h1>
      <div class="page-intro single-col-max mx-auto">
        if you want to become an expert on solidity.
        <a href="#">Join Our community</a>
      </div>
    </div>
  </div>
  <!--//page-header-->
  
  <div class="page-content">
    <div class="container">
      <div class="docs-overview py-5">
        <div class="row justify-content-center">
          <div class="col-lg-4 py-3" *ngFor="let ele of config">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title mb-3">
                  <span class="theme-icon-holder card-icon-holder me-2">
                    <i [class]="ele.icon"></i>
                  </span>
                  <!--//card-icon-holder-->
                  <span class="card-title-text">{{ele.title}}</span>
                </h5>
                <div class="card-text">
                  <p>{{ele.detail}}</p>
                </div>
                <a class="card-link-mask" [href]="ele.route"></a>
              </div>
              <!--//card-body-->
            </div>
            <!--//card-->
          </div>
          <!--//col-->
          <!--//col-->
        </div>
        <!--//row-->
      </div>
      <!--//container-->
    </div>
    <!--//container-->
  </div>
  <!--//page-content-->
