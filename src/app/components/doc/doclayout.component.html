<div class="docs-wrapper basic">
    <div id="docs-sidebar" class="docs-sidebar">
        <div class="card">
            <div class="card-body text-center">
                <span class="theme-icon-holder me-2" style="background:none;">
                   <a href="#"> <i class="{{icon}} fa-4x"></i></a>
                </span>
                <h5 class="card-title">{{title}}</h5>
                <p class="card-text">Solidity v0.8.15</p>
            </div>

            <div class="top-search-box p-3">
                <form class="search-form">
                    <input type="text" placeholder="Search the basics..." name="search"
                        class="form-control search-input">
                    <button type="submit" class="btn search-btn" value="Search"><i class="fas fa-search"></i></button>
                </form>
            </div>
        </div>

        <nav id="docs-nav" class="docs-nav navbar">
            <ul class="section-items list-unstyled nav flex-column pb-3">
                <div class="d-flex flex-row mb-3" *ngFor="let ele of config">
                    <span class="theme-icon-holder me-2">
                        <i class="fas fa-map-signs"></i>
                    </span>
                    <p-accordion>
                        <p-accordionTab header="{{ele.title}}">
                            <li class="nav-item" *ngFor="let child of ele.childs"><a class="nav-link scrollto"
                                    (click)="onTabClick(child.href)">{{child.title}}</a></li>
                        </p-accordionTab>
                    </p-accordion>
                </div>
            </ul>
        </nav>
        <!--//docs-nav-->
    </div>

    <div class="docs-content sidenav-content" id="top">
        <div class="d-flex">
            <div class="nav">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#"><i class="fas fa-home"></i></a></li>
                        <li class="breadcrumb-item"><a href="#">Basics</a></li>
                        <li class="breadcrumb-item"><a href="#">Variables</a></li>
                    </ol>
                </nav>
            </div>
            <div class="github-link"><a href="#"><i class="fab fa-github"></i><span>Edit on GitHub</span></a></div>
        </div>
        <hr style="margin: 1rem 12px;">
        <div class="container">
            <markdown [src]="contentLink"> </markdown>
        </div>
    </div>
</div>
